{% extends "base.html" %}
{% block title %}Eliminar Vehículo{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm border-bottom border-danger border-3">
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-danger display-4"></i>
                    </div>
                    <h4 class="mb-3">¿Eliminar Vehículo?</h4>
                    <p class="text-muted mb-4">Está a punto de eliminar el vehículo con placa <strong>{{ vehiculo.placa
                            }}</strong>. Esta acción no se puede deshacer.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4 me-2">Sí, eliminar</button>
                        <a href="{% url 'transportes:vehiculo_list' %}"
                            class="btn btn-outline-secondary px-4">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
