{% extends 'base.html' %}

{% block title %}{{ titulo|default:"Formulario de Vehículo" }} - ERP Limpieza{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-truck me-2"></i>{{ titulo|default:"Gestión de Vehículo" }}</h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row g-3">
                            {{ form.as_p }}
                        </div>
                        <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                            <a href="{% url 'transportes:vehiculo_lista' %}" class="btn btn-light border">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
