{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="mb-4">
        <a href="{% url 'compras:proveedor_list' %}" class="btn btn-sm btn-erp-outline mb-3">
            <i class="bi bi-arrow-left"></i> Volver al listado
        </a>
        <h2 class="topbar-title fs-3 mb-0">{{ titulo }}</h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8">
            <form method="post" class="erp-card shadow-sm">
                {% csrf_token %}
                <div class="erp-card-header">
                    <h5 class="erp-card-title mb-0">Datos del Proveedor</h5>
                </div>
                <div class="erp-card-body">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Razón Social</label>
                            {{ form.razon_social }}
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">RIF</label>
                            {{ form.rif }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            {{ form.telefono }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            {{ form.email }}
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección Fiscal</label>
                            {{ form.direccion }}
                        </div>
                    </div>
                </div>
                <div class="erp-card-footer bg-light p-3 border-top d-flex justify-content-end gap-2">
                    <a href="{% url 'compras:proveedor_list' %}" class="btn btn-erp btn-erp-outline">Cancelar</a>
                    <button type="submit" class="btn btn-erp btn-erp-primary">
                        <i class="bi bi-save"></i> Guardar Proveedor
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
