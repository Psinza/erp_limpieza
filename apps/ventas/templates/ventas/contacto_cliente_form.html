{% extends "base.html" %}
{% block title %}Agregar Contacto{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:500px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-person-plus"></i> Agregar Contacto</h3>
    <a href="{% url 'ventas:cliente_detail' cli.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="alert alert-info small"><i class="bi bi-person me-1"></i> Cliente: <strong>{{ cli.razon_social }}</strong></div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>{{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar</button>
          <a href="{% url 'ventas:cliente_detail' cli.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
