{% extends "base.html" %}
{% block title %}Nuevo Movimiento de Caja{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-cash"></i> Nuevo Movimiento de Caja</h3>
    <a href="{% url 'tesoreria:caja_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="post">{% csrf_token %}
        {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Registrar</button>
          <a href="{% url 'tesoreria:caja_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
