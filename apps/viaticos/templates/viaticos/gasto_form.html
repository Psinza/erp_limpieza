{% extends "base.html" %}

{% block title %}Registrar Gasto de Viático{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nuevo Gasto para Solicitud #{{ view.kwargs.solicitud_id }}</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <hr>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'viaticos:solicitud_detail' view.kwargs.solicitud_id %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Gasto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
